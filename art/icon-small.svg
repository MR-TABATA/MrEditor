<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0B1020" flood-opacity="0.26"/>
    </filter>
    <clipPath id="page"><rect x="300" y="276" width="424" height="472" rx="40"/></clipPath>
  </defs>

  <rect x="96" y="96" width="832" height="832" rx="188" fill="url(#bg)"/>
  <rect x="96" y="96" width="832" height="430" rx="188" fill="#FFFFFF" opacity="0.06"/>

  <g filter="url(#shadow)"><rect x="300" y="276" width="424" height="472" rx="40" fill="#FFFFFF"/></g>

  <g clip-path="url(#page)">
    <rect x="300" y="276" width="86" height="472" fill="#EDF0F5"/>
    <rect x="384" y="276" width="4" height="472" fill="#D7DCE5"/>
    <!-- highlight band on line 3 -->
    <rect x="386" y="512" width="338" height="84" fill="#F59E0B" opacity="0.18"/>
  </g>

  <!-- 4 bold lines, one highlighted -->
  <g>
    <rect x="410" y="334" width="232" height="52" rx="24" fill="#5B677A"/>
    <rect x="410" y="430" width="286" height="52" rx="24" fill="#5B677A"/>
    <rect x="410" y="528" width="206" height="52" rx="24" fill="#F59E0B"/>
    <rect x="410" y="626" width="256" height="52" rx="24" fill="#5B677A"/>
  </g>
</svg>
